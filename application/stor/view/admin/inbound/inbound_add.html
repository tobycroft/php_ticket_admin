<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>新增入库</title>
    <style>
        .form-item { margin-bottom: 15px; }
        .form-label { display: inline-block; width: 100px; text-align: right; margin-right: 10px; }
        .form-control { padding: 5px 10px; width: 300px; border: 1px solid #ccc; border-radius: 4px; }
        .btn { padding: 6px 20px; cursor: pointer; border-radius: 4px; border: none; }
        .btn-primary { background: #1E9FFF; color: white; }
        .btn-default { background: #eee; color: #333; border: 1px solid #ccc; }
        .alert { padding: 10px; margin: 10px 0; border-radius: 4px; }
        .alert-info { background: #d9edf7; border: 1px solid #bcdff1; color: #31708f; }
        .alert-warning { background: #fcf8e3; border: 1px solid #faebcc; color: #8a6d3b; }
        .alert-danger { background: #f2dede; border: 1px solid #ebccd1; color: #a94442; }
        .table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .table th, .table td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        .table th { background: #f5f5f5; }
        .table-striped tbody tr:nth-child(odd) { background: #f9f9f9; }
        .table-sm th, .table-sm td { padding: 4px 8px; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; }
        .modal-content { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 8px; min-width: 300px; }
        .modal-footer { margin-top: 15px; text-align: right; }
        .modal-footer .btn { margin-left: 10px; }
    </style>
</head>
<body>
    <div style="padding: 20px;">
        <h2>新增入库</h2>
        
        <form id="inbound-form">
            <div class="form-item">
                <label class="form-label">入库类型：</label>
                <select name="type" class="form-control" id="type">
                    <option value="">请选择</option>
                    {foreach $type_list as $item}
                    <option value="{$item.id}">{$item.name}</option>
                    {/foreach}
                </select>
            </div>
            
            <div class="form-item">
                <label class="form-label">所属项目：</label>
                <select name="project_id" class="form-control" id="project_id">
                    <option value="">请选择</option>
                    {foreach $project_list as $item}
                    <option value="{$item.id}">{$item.name}</option>
                    {/foreach}
                </select>
            </div>
            
            <div class="form-item">
                <label class="form-label">物料列表：</label>
                <select name="material_id" class="form-control" id="material_id">
                    <option value="">请选择项目后加载</option>
                </select>
            </div>
            
            <div class="form-item">
                <label class="form-label">备注：</label>
                <textarea name="remark" class="form-control" style="width: 400px; height: 80px;"></textarea>
            </div>
            
            <div id="sn-container" style="display: none; margin-top: 20px; padding-top: 20px; border-top: 1px solid #eee;">
                <div class="form-item">
                    <label class="form-label">已分配SN码：</label>
                    <span style="color: #666;">取消勾选需要入库的SN码</span>
                </div>
                <div id="sn-select-area" style="margin-left: 110px;">
                    <div class="alert alert-info">加载中...</div>
                </div>
            </div>
            
            <div class="form-item" style="margin-left: 110px; margin-top: 20px;">
                <button type="button" class="btn btn-primary" id="submit-btn">提交入库</button>
                <button type="button" class="btn btn-default" onclick="window.location.href='{:url("index")}'">返回列表</button>
            </div>
        </form>
    </div>

    <div class="modal-overlay" id="confirm-modal">
        <div class="modal-content">
            <p id="modal-message">确定要执行此操作吗？</p>
            <div class="modal-footer">
                <button type="button" class="btn btn-default" id="modal-cancel">取消</button>
                <button type="button" class="btn btn-primary" id="modal-confirm">确定</button>
            </div>
        </div>
    </div>

    <script>
        function showModal(message, callback) {
            document.getElementById('modal-message').innerHTML = message;
            document.getElementById('confirm-modal').style.display = 'block';
            
            document.getElementById('modal-cancel').onclick = function() {
                document.getElementById('confirm-modal').style.display = 'none';
            };
            
            document.getElementById('modal-confirm').onclick = function() {
                document.getElementById('confirm-modal').style.display = 'none';
                callback();
            };
        }

        function showMessage(message, type) {
            var div = document.createElement('div');
            div.className = 'alert alert-' + (type || 'info');
            div.innerHTML = message;
            div.style.position = 'fixed';
            div.style.top = '20px';
            div.style.left = '50%';
            div.style.transform = 'translateX(-50%)';
            div.style.zIndex = '9999';
            document.body.appendChild(div);
            setTimeout(function() {
                div.remove();
            }, 3000);
        }

        document.getElementById('project_id').addEventListener('change', function() {
            var projectId = this.value;
            var materialSelect = document.getElementById('material_id');
            var snContainer = document.getElementById('sn-container');
            
            materialSelect.innerHTML = '<option value="">请选择项目后加载</option>';
            
            if (projectId) {
                var xhr = new XMLHttpRequest();
                xhr.open('GET', '{:url("materials")}' + '?project_id=' + projectId, true);
                xhr.onreadystatechange = function() {
                    if (xhr.readyState == 4 && xhr.status == 200) {
                        try {
                            var data = JSON.parse(xhr.responseText);
                            if (data.code == 1) {
                                var html = '<option value="">请选择物料</option>';
                                if (data.data.length > 0) {
                                    data.data.forEach(function(item) {
                                        html += '<option value="' + item.id + '">' + item.name + '</option>';
                                    });
                                } else {
                                    html = '<option value="">该项目暂无已分配的物料</option>';
                                }
                                materialSelect.innerHTML = html;
                            } else {
                                showMessage(data.msg, 'danger');
                            }
                        } catch (e) {
                            showMessage('解析数据失败', 'danger');
                        }
                    } else if (xhr.readyState == 4) {
                        showMessage('加载物料列表失败', 'danger');
                    }
                };
                xhr.send();
            }
            
            snContainer.style.display = 'none';
        });

        document.getElementById('material_id').addEventListener('change', function() {
            var materialId = this.value;
            var projectId = document.getElementById('project_id').value;
            var snContainer = document.getElementById('sn-container');
            var snSelectArea = document.getElementById('sn-select-area');
            
            if (materialId && projectId) {
                snContainer.style.display = 'block';
                snSelectArea.innerHTML = '<div class="alert alert-info">加载中...</div>';
                
                var xhr = new XMLHttpRequest();
                xhr.open('GET', '{:url("sns")}' + '?project_id=' + projectId + '&material_id=' + materialId, true);
                xhr.onreadystatechange = function() {
                    if (xhr.readyState == 4 && xhr.status == 200) {
                        try {
                            var data = JSON.parse(xhr.responseText);
                            if (data.code == 1) {
                                var html = '';
                                if (data.data.length > 0) {
                                    html = '<table class="table table-striped table-sm"><thead><tr><th width="30"><input type="checkbox" id="check-all-sn" checked></th><th>SN码</th><th>所属物料</th></tr></thead><tbody>';
                                    data.data.forEach(function(item) {
                                        html += '<tr><td><input type="checkbox" name="sns[]" value="' + item.sn + '" checked></td><td>' + item.sn + '</td><td>' + (item.material_name || '') + '</td></tr>';
                                    });
                                    html += '</tbody></table>';
                                } else {
                                    html = '<div class="alert alert-warning">该物料暂无已分配的SN码</div>';
                                }
                                snSelectArea.innerHTML = html;
                                
                                var checkAll = document.getElementById('check-all-sn');
                                if (checkAll) {
                                    checkAll.addEventListener('click', function() {
                                        var checkboxes = document.querySelectorAll('input[name="sns[]"]');
                                        checkboxes.forEach(function(checkbox) {
                                            checkbox.checked = checkAll.checked;
                                        });
                                    });
                                }
                            } else {
                                snSelectArea.innerHTML = '<div class="alert alert-danger">' + data.msg + '</div>';
                            }
                        } catch (e) {
                            snSelectArea.innerHTML = '<div class="alert alert-danger">解析数据失败</div>';
                        }
                    } else if (xhr.readyState == 4) {
                        snSelectArea.innerHTML = '<div class="alert alert-danger">加载SN码失败</div>';
                    }
                };
                xhr.send();
            } else {
                snContainer.style.display = 'none';
            }
        });

        document.getElementById('submit-btn').addEventListener('click', function() {
            var type = document.getElementById('type').value;
            var project_id = document.getElementById('project_id').value;
            var material_id = document.getElementById('material_id').value;
            
            if (!type) {
                showMessage('请选择入库类型', 'danger');
                return;
            }
            
            if (!project_id) {
                showMessage('请选择所属项目', 'danger');
                return;
            }
            
            if (!material_id) {
                showMessage('请选择物料', 'danger');
                return;
            }
            
            var selectedSns = [];
            var checkboxes = document.querySelectorAll('input[name="sns[]"]:checked');
            checkboxes.forEach(function(checkbox) {
                selectedSns.push(checkbox.value);
            });
            
            if (selectedSns.length == 0) {
                showMessage('请选择要入库的SN码', 'danger');
                return;
            }
            
            showModal('确定要将选中的 ' + selectedSns.length + ' 个SN码入库（归还到仓库）吗？', function() {
                var xhr = new XMLHttpRequest();
                xhr.open('POST', '{:url("add")}', true);
                xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
                xhr.setRequestHeader('X-Requested-With', 'XMLHttpRequest');
                xhr.onreadystatechange = function() {
                    if (xhr.readyState == 4 && xhr.status == 200) {
                        try {
                            var data = JSON.parse(xhr.responseText);
                            if (data.code == 1) {
                                showMessage(data.msg, 'info');
                                setTimeout(function() {
                                    window.location.href = '{:url("index")}';
                                }, 1500);
                            } else {
                                showMessage(data.msg, 'danger');
                            }
                        } catch (e) {
                            showMessage('解析响应失败', 'danger');
                        }
                    } else if (xhr.readyState == 4) {
                        showMessage('提交失败', 'danger');
                    }
                };
                
                var params = 'type=' + encodeURIComponent(type) +
                             '&project_id=' + encodeURIComponent(project_id) +
                             '&material_id=' + encodeURIComponent(material_id) +
                             '&remark=' + encodeURIComponent(document.querySelector('textarea[name="remark"]').value);
                
                selectedSns.forEach(function(sn) {
                    params += '&sns[]=' + encodeURIComponent(sn);
                });
                
                xhr.send(params);
            });
        });
    </script>
</body>
</html>
