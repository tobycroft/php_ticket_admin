<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>新增出库</title>
    <link rel="stylesheet" href="/public/static/admin/libs/layui/css/layui.css">
    <script src="/public/static/admin/libs/layui/layui.js"></script>
    <style>
        .form-item { margin-bottom: 15px; }
        .form-label { display: inline-block; width: 100px; text-align: right; margin-right: 10px; }
        .form-control { padding: 5px 10px; width: 300px; }
        .btn { padding: 6px 20px; cursor: pointer; }
        .btn-primary { background: #1E9FFF; color: white; border: none; }
        .btn-default { background: #eee; color: #333; border: 1px solid #ccc; }
        .alert { padding: 10px; margin: 10px 0; border-radius: 4px; }
        .alert-info { background: #d9edf7; border: 1px solid #bcdff1; color: #31708f; }
        .alert-warning { background: #fcf8e3; border: 1px solid #faebcc; color: #8a6d3b; }
        .alert-danger { background: #f2dede; border: 1px solid #ebccd1; color: #a94442; }
        .table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .table th, .table td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        .table th { background: #f5f5f5; }
        .table-striped tbody tr:nth-child(odd) { background: #f9f9f9; }
        .table-sm th, .table-sm td { padding: 4px 8px; }
    </style>
</head>
<body>
    <div style="padding: 20px;">
        <h2>新增出库</h2>
        
        <form id="outbound-form">
            <div class="form-item">
                <label class="form-label">出库类型：</label>
                <select name="type" class="form-control" id="type">
                    <option value="">请选择</option>
                    {foreach $type_list as $item}
                    <option value="{$item.id}">{$item.name}</option>
                    {/foreach}
                </select>
            </div>
            
            <div class="form-item">
                <label class="form-label">所属项目：</label>
                <select name="project_id" class="form-control" id="project_id">
                    <option value="">请选择</option>
                    {foreach $project_list as $item}
                    <option value="{$item.id}">{$item.name}</option>
                    {/foreach}
                </select>
            </div>
            
            <div class="form-item">
                <label class="form-label">物料列表：</label>
                <select name="material_id" class="form-control" id="material_id">
                    <option value="">请选择</option>
                    {foreach $material_list as $item}
                    <option value="{$item.id}">{$item.name} ({$item.category_id}) - {$item.seller}</option>
                    {/foreach}
                </select>
            </div>
            
            <div class="form-item">
                <label class="form-label">备注：</label>
                <textarea name="remark" class="form-control" style="width: 400px; height: 80px;"></textarea>
            </div>
            
            <div id="sn-container" style="display: none; margin-top: 20px; padding-top: 20px; border-top: 1px solid #eee;">
                <div class="form-item">
                    <label class="form-label">可用SN码：</label>
                </div>
                <div id="sn-select-area" style="margin-left: 110px;">
                    <div class="alert alert-info">加载中...</div>
                </div>
            </div>
            
            <div class="form-item" style="margin-left: 110px; margin-top: 20px;">
                <button type="button" class="btn btn-primary" id="submit-btn">提交出库</button>
                <button type="button" class="btn btn-default" onclick="window.location.href='{:url("index")}'">返回列表</button>
            </div>
        </form>
    </div>

    <script>
        layui.use(['layer'], function() {
            var layer = layui.layer;
            
            $('#material_id').change(function() {
                var materialId = $(this).val();
                if (materialId) {
                    $('#sn-container').show();
                    $('#sn-select-area').html('<div class="alert alert-info">加载中...</div>');
                    
                    $.get('{:url("getAvailableSns")}', {material_id: materialId}, function(data) {
                        if (data.code == 1) {
                            var html = '';
                            if (data.data.length > 0) {
                                html = '<table class="table table-striped table-sm"><thead><tr><th width="30"><input type="checkbox" id="check-all-sn"></th><th>SN码</th></tr></thead><tbody>';
                                $.each(data.data, function(index, item) {
                                    html += '<tr><td><input type="checkbox" name="sns[]" value="' + item.sn + '"></td><td>' + item.sn + '</td></tr>';
                                });
                                html += '</tbody></table>';
                            } else {
                                html = '<div class="alert alert-warning">该物料暂无可用SN码</div>';
                            }
                            $('#sn-select-area').html(html);
                            
                            $('#check-all-sn').click(function() {
                                $('input[name="sns[]"]').prop('checked', this.checked);
                            });
                        } else {
                            $('#sn-select-area').html('<div class="alert alert-danger">' + data.msg + '</div>');
                        }
                    }, 'json').error(function() {
                        $('#sn-select-area').html('<div class="alert alert-danger">加载SN码失败</div>');
                    });
                } else {
                    $('#sn-container').hide();
                }
            });
            
            $('#submit-btn').click(function() {
                var type = $('#type').val();
                var project_id = $('#project_id').val();
                var material_id = $('#material_id').val();
                
                if (!type) {
                    layer.msg('请选择出库类型');
                    return;
                }
                
                if (!material_id) {
                    layer.msg('请选择物料');
                    return;
                }
                
                var selectedSns = [];
                $('input[name="sns[]"]:checked').each(function() {
                    selectedSns.push($(this).val());
                });
                
                if (selectedSns.length == 0) {
                    layer.msg('请选择SN码');
                    return;
                }
                
                layer.confirm('确定要出库选中的SN码吗？', function(index) {
                    $.post('{:url("add")}', {
                        type: type,
                        project_id: project_id,
                        material_id: material_id,
                        remark: $('textarea[name="remark"]').val(),
                        sns: selectedSns
                    }, function(data) {
                        if (data.code == 1) {
                            layer.msg(data.msg, {icon: 1});
                            setTimeout(function() {
                                window.location.href = '{:url("index")}';
                            }, 1500);
                        } else {
                            layer.msg(data.msg, {icon: 2});
                        }
                    }, 'json').error(function() {
                        layer.msg('提交失败', {icon: 2});
                    });
                    layer.close(index);
                });
            });
        });
    </script>
</body>
</html>
